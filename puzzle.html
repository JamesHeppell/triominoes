<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triominoes – Puzzle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="puzzle-header">
    <a href="index.html" class="back-link">← Back</a>
    <h1 id="puzzle-title">Puzzle</h1>
    <span class="header-spacer">
      <svg class="logo-tri logo-tri--header-right" viewBox="0 0 50 38" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <polygon points="25,4 42,34 8,34" fill="#FFF8EE" stroke="#e94560" stroke-width="2" stroke-linejoin="round"/>
        <line x1="25" y1="4"  x2="25"   y2="34" stroke="#5577aa" stroke-width="1.5" stroke-dasharray="2 3" stroke-linecap="round"/>
        <line x1="42" y1="34" x2="16.5" y2="19" stroke="#5577aa" stroke-width="1.5" stroke-dasharray="2 3" stroke-linecap="round"/>
        <line x1="8"  y1="34" x2="33.5" y2="19" stroke="#5577aa" stroke-width="1.5" stroke-dasharray="2 3" stroke-linecap="round"/>
      </svg>
    </span>
  </header>
  <p class="puzzle-instructions">Fill the grid with all the triominoes to meet the constraints.</p>

  <main class="puzzle-main">
    <canvas id="puzzle-canvas"></canvas>

    <div id="solved-panel" hidden>
      <p class="solved-msg">All pieces placed!</p>
      <p id="solved-sub" class="solved-sub">Try a different difficulty:</p>
      <nav id="solved-nav" class="difficulty-nav">
        <a href="puzzle.html?d=easy"   id="solved-btn-easy"   class="btn btn-easy">Easy</a>
        <a href="puzzle.html?d=medium" id="solved-btn-medium" class="btn btn-medium">Medium</a>
        <a href="puzzle.html?d=hard"   id="solved-btn-hard"   class="btn btn-hard">Hard</a>
      </nav>
    </div>
  </main>

  <script src="puzzle.js"></script>
</body>
</html>
